<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Medical Chatbot</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f6f7f9;
        color: #1f2937;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 32px 16px;
      }

      h1 {
        font-size: 28px;
        margin: 0 0 16px;
      }

      #chat {
        min-height: 360px;
        padding: 16px;
        background: white;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        overflow-y: auto;
      }

      .message {
        margin: 0 0 12px;
        line-height: 1.5;
      }

      .user {
        font-weight: 700;
      }

      form {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      input {
        flex: 1;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 16px;
      }

      button {
        padding: 12px 16px;
        border: 0;
        border-radius: 6px;
        background: #0f766e;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Medical Chatbot</h1>
      <div id="chat"></div>

      <form id="chat-form">
        <input id="message" name="msg" placeholder="Ask a question..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </main>

    <script>
      const chat = document.querySelector("#chat");
      const form = document.querySelector("#chat-form");
      const input = document.querySelector("#message");

      function addMessage(label, text, className = "") {
        const p = document.createElement("p");
        p.className = `message ${className}`;
        p.textContent = `${label}: ${text}`;
        chat.appendChild(p);
        chat.scrollTop = chat.scrollHeight;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const question = input.value.trim();
        if (!question) return;

        addMessage("You", question, "user");
        input.value = "";

        const body = new FormData();
        body.append("msg", question);

        const response = await fetch("/get", {
          method: "POST",
          body,
        });
        const answer = await response.text();

        addMessage("Bot", answer);
      });
    </script>
  </body>
</html>
